/* ---------------------------------- API CLIENT ---------------------------------- */
const API_BASE = "/api";

async function apiFetch(path, options = {}) {
  const res = await fetch(`${API_BASE}/${path}`, {
    credentials: "include",
    headers: options.body ? { "Content-Type": "application/json" } : undefined,
    ...options,
  });
  let data = null;
  try { data = await res.json(); } catch (e) {}
  if (!res.ok) throw new Error((data && data.error) || "خطا در ارتباط با سرور");
  return data;
}

// خواندن فهرستی از منابع عمومی (اخبار، فرمانداری، شهرداری، گردشگری، رویدادها، هشدارها)
function useApiList(table, seed = []) {
  const [items, setItems] = useState(null);

  const reload = async () => {
    try {
      const data = await apiFetch(`resource.php?table=${table}`);
      setItems(data);
    } catch (e) {
      setItems(seed);
    }
  };

  useEffect(() => { reload(); /* eslint-disable-next-line */ }, [table]);

  return [items, reload];
}

const SLIDE_GRADIENTS = [
  [C.primary, C.dark],
  [C.clay, C.dark],
  [C.gold, C.primaryDark],
  [C.alert, C.dark],
];
function gradientFor(i) {
  const [a, b] = SLIDE_GRADIENTS[i % SLIDE_GRADIENTS.length];
  return `linear-gradient(135deg, ${a}, ${b})`;
}

/* ---------------------------------- NEWS SLIDER ---------------------------------- */
function NewsSlider({ news, go }) {
  const [index, setIndex] = useState(0);
  const slides = (news || []).slice(0, 5);

  useEffect(() => {
    if (slides.length < 2) return;
    const t = setInterval(() => setIndex((i) => (i + 1) % slides.length), 4500);
    return () => clearInterval(t);
  }, [slides.length]);

  if (!news) {
    return <div className="mx-4 mt-4 mb-6 h-36 rounded-2xl animate-pulse" style={{ backgroundColor: C.border }} />;
  }
  if (slides.length === 0) return null;

  return (
    <div className="px-4 mt-4 mb-6">
      <div className="relative rounded-2xl overflow-hidden h-40 cursor-pointer" style={{ background: gradientFor(index) }} onClick={() => go("news")}>
        {slides.map((n, i) => (
          <div key={n.id} className="absolute inset-0 flex flex-col justify-end p-4" style={{ opacity: i === index ? 1 : 0, transition: "opacity 0.5s" }}>
            <span className="self-start text-[11px] font-bold px-2 py-1 rounded-full mb-2" style={{ backgroundColor: "rgba(255,255,255,0.18)", color: "#fff" }}>{n.category}</span>
            <p className="text-white text-base font-extrabold leading-snug line-clamp-2">{n.title}</p>
          </div>
        ))}
      </div>
      <div className="flex justify-center gap-1.5 mt-2.5">
        {slides.map((_, i) => (
          <button key={i} onClick={() => setIndex(i)} className="h-1.5 rounded-full" style={{ width: i === index ? 18 : 6, backgroundColor: i === index ? C.primary : C.border, transition: "width 0.3s" }} />
        ))}
      </div>
    </div>
  );
}

const MARKET_CATEGORIES = ["محصولات کشاورزی", "صنایع‌دستی", "خدمات", "کالای دیجیتال و خانگی", "سایر"];

function MarketScreen({ goBack }) {
  const [market, setMarket] = useState(null);

  const [showForm, setShowForm] = useState(false);
  const [filter, setFilter] = useState("همه");

  const [submitted, setSubmitted] = useState(false);
  const [error, setError] = useState("");

  useEffect(() => {
    (async () => {
      try {
        setMarket(await apiFetch("market.php"));
      } catch (e) {
        setMarket(SEED_MARKET);
      }
    })();
  }, []);

  const approved = useMemo(() => (market || []).filter((m) => m.status === "approved"), [market]);
  const filtered = filter === "همه" ? approved : approved.filter((m) => m.category === filter);

    e.preventDefault();

/* ---------------------------------- POLLS / VOTING ---------------------------------- */
function PollsScreen({ goBack, user, openAccount }) {
  const [polls, setPolls] = useState(null);
  const [busyId, setBusyId] = useState(null);
  const [error, setError] = useState("");

  const reload = async () => {
    try { setPolls(await apiFetch("polls.php")); } catch (e) { setPolls(SEED_POLLS); }
  };
  useEffect(() => { reload(); }, []);

  const vote = async (pollId, optionIndex) => {
    if (!user) { openAccount(); return; }
    setBusyId(pollId);
    setError("");
    try {
      const updated = await apiFetch(`polls.php?action=vote&id=${pollId}`, { method: "POST", body: JSON.stringify({ option_index: optionIndex }) });
      setPolls((prev) => prev.map((p) => (p.id === pollId ? updated : p)));
    } catch (e) {
      setError(e.message || "ثبت رای با خطا مواجه شد.");
    } finally {
      setBusyId(null);
    }
  };

  return (
    <div>
      <ScreenHeader title="نظرسنجی و رای‌گیری" onBack={goBack} />
      <div className="p-4">
        {!user && (
          <button onClick={openAccount} className="w-full text-right mb-4 rounded-2xl p-3.5 flex items-center justify-between" style={{ backgroundColor: C.primarySoft }}>
            <div>
              <p className="text-sm font-extrabold" style={{ color: C.primaryDark }}>برای رای دادن وارد شوید</p>
              <p className="text-xs mt-0.5" style={{ color: C.textSoft }}>ثبت‌نام رایگان با ایمیل</p>
            </div>
            <ChevronLeft size={18} style={{ color: C.primaryDark, transform: "rotate(180deg)" }} />
          </button>
        )}
        {error && (
          <div className="flex items-center gap-2 text-xs font-bold rounded-xl p-3 mb-3" style={{ backgroundColor: C.alertSoft, color: C.alert }}>
            <AlertTriangle size={14} /> {error}
          </div>
        )}

        <div className="space-y-3">
          {!polls && <Loading />}
          {polls && polls.length === 0 && <EmptyState icon={Vote} text="در حال حاضر نظرسنجی فعالی وجود ندارد." />}
          {polls && polls.map((poll) => {
            const hasVoted = poll.myVote !== null && poll.myVote !== undefined;
            return (
              <Card key={poll.id} className="p-4">
                <div className="flex items-center justify-between mb-3">
                  <Badge tone={poll.active ? "primary" : "clay"}>{poll.active ? "فعال" : "پایان‌یافته"}</Badge>
                  <span className="text-[11px]" style={{ color: C.textSoft }}>{poll.total} رای</span>
                </div>
                <p className="text-sm font-bold leading-snug mb-3" style={{ color: C.text }}>{poll.question}</p>
                <div className="space-y-2">
                  {poll.options.map((opt, i) => {
                    const pct = poll.total > 0 ? Math.round(((poll.counts[i] || 0) / poll.total) * 100) : 0;
                    const isMine = poll.myVote === i;
                    if (hasVoted || !poll.active) {
                      return (
                        <div key={i} className="relative rounded-xl overflow-hidden p-2.5" style={{ border: `1px solid ${isMine ? C.primary : C.border}` }}>
                          <div className="absolute inset-y-0 right-0" style={{ width: `${pct}%`, backgroundColor: C.primarySoft, zIndex: 0 }} />
                          <div className="relative flex items-center justify-between" style={{ zIndex: 1 }}>
                            <span className="text-xs font-bold" style={{ color: C.text }}>{opt} {isMine && "✓"}</span>
                            <span className="text-xs font-extrabold" style={{ color: C.primaryDark }}>{pct}٪</span>
                          </div>
                        </div>
                      );
                    }
                    return (
                      <button key={i} disabled={busyId === poll.id} onClick={() => vote(poll.id, i)} className="w-full text-right text-xs font-bold rounded-xl p-2.5" style={{ border: `1px solid ${C.border}`, color: C.text, opacity: busyId === poll.id ? 0.6 : 1 }}>
                        {opt}
                      </button>
                    );
                  })}
                </div>
              </Card>
            );
          })}
        </div>
      </div>
    </div>
  );
}

/* ---------------------------------- ADMIN: GENERIC CRUD SECTION ---------------------------------- */
function emptyForm(fields) {
  const f = {};
  fields.forEach((field) => {
    if (field.type === "checkbox") f[field.key] = false;
    else if (field.type === "select") f[field.key] = field.options[0];
    else if (field.type === "number") f[field.key] = field.default ?? 0;
    else f[field.key] = "";
  });
  return f;
}

function AdminSection({ title, table, fields, primaryKey, tagKey }) {
  const [items, reload] = useApiList(table, []);
  const [form, setForm] = useState(() => emptyForm(fields));
  const [open, setOpen] = useState(false);
  const [error, setError] = useState("");

  const addItem = async (e) => {
    e.preventDefault();
    setError("");
    try {
      await apiFetch(`resource.php?table=${table}`, { method: "POST", body: JSON.stringify({ date: today(), ...form }) });
      setForm(emptyForm(fields));
      setOpen(false);
      reload();
    } catch (e2) {
      setError("ثبت اطلاعات با خطا مواجه شد.");
    }
  };

  const remove = async (id) => {
    try {
      await apiFetch(`resource.php?table=${table}&id=${id}`, { method: "DELETE" });
      reload();
    } catch (e2) {}
  };

  return (
    <div>
      <div className="flex items-center justify-between mb-3">
        <h2 className="text-base font-extrabold" style={{ color: C.text }}>{title}</h2>
        <button onClick={() => setOpen((o) => !o)} className="flex items-center gap-1 text-xs font-bold px-3 py-1.5 rounded-lg text-white" style={{ backgroundColor: C.primary }}>
          <Plus size={13} /> {open ? "بستن" : "افزودن"}
        </button>
      </div>

      {open && (
        <form onSubmit={addItem} className="rounded-2xl p-4 mb-4" style={{ backgroundColor: C.primarySoft }}>
          {error && <p className="text-xs font-bold mb-3" style={{ color: C.alert }}>{error}</p>}
          {fields.map((field) => (
            <Field key={field.key} label={field.label}>
              {field.type === "textarea" ? (
                <textarea style={{ ...inputStyle, minHeight: 70 }} value={form[field.key]} onChange={(e) => setForm({ ...form, [field.key]: e.target.value })} />
              ) : field.type === "select" ? (
                <select style={inputStyle} value={form[field.key]} onChange={(e) => setForm({ ...form, [field.key]: e.target.value })}>
                  {field.options.map((o) => <option key={o} value={o}>{o}</option>)}
                </select>
              ) : field.type === "checkbox" ? (
                <label className="flex items-center gap-2 text-sm font-medium">
                  <input type="checkbox" checked={form[field.key]} onChange={(e) => setForm({ ...form, [field.key]: e.target.checked })} />
                  فعال
                </label>
              ) : field.type === "number" ? (
                <input style={inputStyle} type="number" min={0} max={100} value={form[field.key]} onChange={(e) => setForm({ ...form, [field.key]: e.target.value })} required />
              ) : (
                <input style={inputStyle} value={form[field.key]} onChange={(e) => setForm({ ...form, [field.key]: e.target.value })} required />
              )}
            </Field>
          ))}
          <button type="submit" className="w-full text-white font-bold py-2.5 rounded-xl text-sm" style={{ backgroundColor: C.primaryDark }}>ثبت</button>
        </form>
      )}

      <div className="space-y-2">
        {!items && <Loading />}
        {items && items.length === 0 && <EmptyState text="موردی ثبت نشده است." />}
        {items && items.map((it) => (
          <Card key={it.id} className="p-3.5">
            <div className="flex items-start justify-between gap-2">
              <div className="min-w-0">
                <div className="flex items-center gap-2 mb-1 flex-wrap">
                  {tagKey && it[tagKey] !== undefined && (
                    typeof it[tagKey] === "boolean"
                      ? <Badge tone={it[tagKey] ? "primary" : "clay"}>{it[tagKey] ? "فعال" : "غیرفعال"}</Badge>
                      : <Badge tone={it[tagKey] === "بحرانی" ? "alert" : it[tagKey] === "هشدار" ? "gold" : "primary"}>{it[tagKey]}</Badge>
                  )}
                  <span className="text-[11px]" style={{ color: C.textSoft }}>{it.date}</span>
                </div>
                <p className="text-sm font-bold leading-snug" style={{ color: C.text }}>{it[primaryKey]}</p>
                {fields.filter((f) => f.type === "textarea").map((f) => (
                  <p key={f.key} className="text-xs leading-relaxed mt-1 line-clamp-2" style={{ color: C.textSoft }}>{it[f.key]}</p>
                ))}
              </div>
              <button onClick={() => remove(it.id)} className="shrink-0 w-8 h-8 rounded-lg flex items-center justify-center" style={{ backgroundColor: C.alertSoft }}>
                <Trash2 size={14} style={{ color: C.alert }} />
              </button>
            </div>
          </Card>
        ))}
      </div>
    </div>
  );
}

              </button>
              <button onClick={() => remove(r.id)} className="w-9 flex items-center justify-center rounded-lg" style={{ backgroundColor: C.alertSoft }}>
                <Trash2 size={13} style={{ color: C.alert }} />
              </button>
            </div>
          </Card>
        ))}
      </div>
    </div>
  );
}

/* ---------------------------------- ADMIN: POLLS ---------------------------------- */
function AdminPolls() {
  const [polls, setPolls] = useState(null);
  const [open, setOpen] = useState(false);
  const [question, setQuestion] = useState("");
  const [options, setOptions] = useState(["", ""]);
  const [error, setError] = useState("");

  const reload = async () => {
    try { setPolls(await apiFetch("polls.php")); } catch (e) { setPolls([]); }
  };
  useEffect(() => { reload(); }, []);

  const updateOption = (i, v) => setOptions((opts) => opts.map((o, idx) => (idx === i ? v : o)));
  const addOptionField = () => setOptions((opts) => [...opts, ""]);
  const removeOptionField = (i) => setOptions((opts) => opts.filter((_, idx) => idx !== i));

  const create = async (e) => {
    e.preventDefault();
    setError("");
    const cleanOptions = options.map((o) => o.trim()).filter(Boolean);
    if (!question.trim() || cleanOptions.length < 2) {
      setError("سوال و حداقل دو گزینه را وارد کنید.");
      return;
    }
    try {
      await apiFetch("polls.php", { method: "POST", body: JSON.stringify({ question, options: cleanOptions, date: today() }) });
      setQuestion("");
      setOptions(["", ""]);
      setOpen(false);
      reload();
    } catch (e3) {
      setError(e3.message || "ثبت نظرسنجی با خطا مواجه شد.");
    }
  };

  const toggle = async (id) => {
    await apiFetch(`polls.php?action=toggle&id=${id}`, { method: "POST" });
    reload();
  };
  const remove = async (id) => {
    await apiFetch(`polls.php?id=${id}`, { method: "DELETE" });
    reload();
  };

  return (
    <div>
      <div className="flex items-center justify-between mb-3">
        <h2 className="text-base font-extrabold" style={{ color: C.text }}>نظرسنجی و رای‌گیری</h2>
        <button onClick={() => setOpen((o) => !o)} className="flex items-center gap-1 text-xs font-bold px-3 py-1.5 rounded-lg text-white" style={{ backgroundColor: C.primary }}>
          <Plus size={13} /> {open ? "بستن" : "نظرسنجی جدید"}
        </button>
      </div>

      {open && (
        <form onSubmit={create} className="rounded-2xl p-4 mb-4" style={{ backgroundColor: C.primarySoft }}>
          {error && <p className="text-xs font-bold mb-3" style={{ color: C.alert }}>{error}</p>}
          <Field label="سوال نظرسنجی">
            <input style={inputStyle} value={question} onChange={(e) => setQuestion(e.target.value)} required />
          </Field>
          <Field label="گزینه‌ها">
            <div className="space-y-2">
              {options.map((opt, i) => (
                <div key={i} className="flex gap-2">
                  <input style={inputStyle} value={opt} onChange={(e) => updateOption(i, e.target.value)} placeholder={`گزینه ${i + 1}`} />
                  {options.length > 2 && (
                    <button type="button" onClick={() => removeOptionField(i)} className="w-9 shrink-0 rounded-lg flex items-center justify-center" style={{ backgroundColor: C.alertSoft }}>
                      <Trash2 size={13} style={{ color: C.alert }} />
                    </button>
                  )}
                </div>
              ))}
            </div>
            <button type="button" onClick={addOptionField} className="mt-2 text-xs font-bold flex items-center gap-1" style={{ color: C.primaryDark }}>
              <Plus size={13} /> افزودن گزینه
            </button>
          </Field>
          <button type="submit" className="w-full text-white font-bold py-2.5 rounded-xl text-sm mt-1" style={{ backgroundColor: C.primaryDark }}>ثبت نظرسنجی</button>
        </form>
      )}

      <div className="space-y-2.5">
        {!polls && <Loading />}
        {polls && polls.length === 0 && <EmptyState icon={Vote} text="نظرسنجی‌ای ثبت نشده است." />}
        {polls && polls.map((poll) => (
          <Card key={poll.id} className="p-3.5">
            <div className="flex items-center justify-between mb-2">
              <Badge tone={poll.active ? "primary" : "clay"}>{poll.active ? "فعال" : "غیرفعال"}</Badge>
              <span className="text-[11px]" style={{ color: C.textSoft }}>{poll.total} رای</span>
            </div>
            <p className="text-sm font-bold mb-2" style={{ color: C.text }}>{poll.question}</p>
            <div className="space-y-1.5 mb-3">
              {poll.options.map((opt, i) => {
                const pct = poll.total > 0 ? Math.round(((poll.counts[i] || 0) / poll.total) * 100) : 0;
                return (
                  <div key={i} className="flex items-center justify-between text-xs" style={{ color: C.textSoft }}>
                    <span>{opt}</span>
                    <span className="font-bold" style={{ color: C.text }}>{poll.counts[i] || 0} ({pct}٪)</span>
                  </div>
                );
              })}
            </div>
            <div className="flex gap-2">
              <button onClick={() => toggle(poll.id)} className="flex-1 text-xs font-bold py-2 rounded-lg" style={{ backgroundColor: C.claySoft, color: C.clay }}>
                {poll.active ? "غیرفعال‌سازی" : "فعال‌سازی"}
              </button>
              <button onClick={() => remove(poll.id)} className="w-9 flex items-center justify-center rounded-lg" style={{ backgroundColor: C.alertSoft }}>
                <Trash2 size={13} style={{ color: C.alert }} />
              </button>
            </div>
          </Card>
        ))}
      </div>
    </div>
  );
}

/* ---------------------------------- ROOT APP ---------------------------------- */
function LendehSmartCity() {
  const [screen, setScreen] = useState("home");
  const [adminMode, setAdminMode] = useState(null); // null | 'login' | 'panel'
  const [checkingSession, setCheckingSession] = useState(true);
  const [user, setUser] = useState(null);

  useEffect(() => {
    (async () => {
      try {
        const data = await apiFetch("auth.php");
        if (data && data.admin) setAdminMode("panel");
      } catch (e) {}
      try {
        const data = await apiFetch("account.php");
        if (data && data.user) setUser(data.user);
      } catch (e) {}
      setCheckingSession(false);
    })();
  }, []);

  const go = (key) => setScreen(key);

  const exitAdmin = async () => {
    try { await apiFetch("auth.php", { method: "POST", body: JSON.stringify({ action: "logout" }) }); } catch (e) {}
    setAdminMode(null);
    setScreen("home");
  };

  const renderScreen = () => {
    switch (screen) {
      case "home": return <HomeScreen go={go} openAdmin={() => setAdminMode("login")} />;
      case "news": return <NewsScreen goBack={() => go("home")} />;
      case "market": return <MarketScreen goBack={() => go("home")} />;
      case "gov": return <AnnouncementScreen title="فرمانداری لنده" table="government" seed={SEED_GOV} icon={Landmark} goBack={() => go("home")} />;
      case "muni": return <AnnouncementScreen title="شهرداری لنده" table="municipality" seed={SEED_MUNI} icon={Building2} goBack={() => go("home")} />;
      case "crisis": return <CrisisScreen goBack={() => go("home")} />;
      case "tourism": return <TourismScreen goBack={() => go("home")} />;
      case "projects": return <ProjectsScreen goBack={() => go("home")} />;
      case "polls": return <PollsScreen goBack={() => go("home")} user={user} openAccount={() => go("account")} />;
      case "account": return <AccountScreen goBack={() => go("more")} user={user} setUser={setUser} />;
      case "more": return <MoreScreen go={go} goBack={() => go("home")} openAdmin={() => setAdminMode("login")} user={user} />;
      default: return null;
    }
  };

  return (
    <div dir="rtl" lang="fa" style={{ fontFamily: "'Vazirmatn', Tahoma, sans-serif" }}>
      <style>{FONT_IMPORT}{`
        * { box-sizing: border-box; }
        body { margin: 0; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-thumb { background: #cfc8b6; border-radius: 4px; }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
      `}</style>
      <div className="min-h-screen flex items-center justify-center py-0 md:py-8" style={{ backgroundColor: "#E9E2D0" }}>
        <div className="w-full md:max-w-[430px] md:rounded-[2rem] md:shadow-2xl overflow-hidden relative" style={{ backgroundColor: C.cream, minHeight: "100vh" }}>
          {checkingSession && <Loading />}
          {!checkingSession && adminMode === "login" && (
            <AdminLogin onSuccess={() => setAdminMode("panel")} onCancel={() => setAdminMode(null)} />
          )}
          {!checkingSession && adminMode === "panel" && (
            <AdminDashboard onExit={exitAdmin} />
          )}
          {!checkingSession && !adminMode && (
            <>
              <div className="pb-20">{renderScreen()}</div>
              <BottomNav screen={screen} go={go} />
            </>
          )}
        </div>
      </div>
    </div>
  );
}


ReactDOM.createRoot(document.getElementById('root')).render(<LendehSmartCity />);
</script>
